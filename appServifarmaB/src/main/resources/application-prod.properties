# Database (producción - desde variables de entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA (producción)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT (producción - desde variables de entorno)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Logging (producción)
logging.level.com.example.proyecto.app=WARN
logging.level.org.springframework=ERROR

# JSON Configuration (producción - desde variable de entorno)
jsonpe.api-key=${JSONPE_API_KEY}

# CORS (producción - dominio real)
app.cors.allowed-origins=https://tudominio.com
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true