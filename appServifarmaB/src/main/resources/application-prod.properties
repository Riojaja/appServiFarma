# ====================================================
# CONFIGURACIÓN DE PRODUCCIÓN - Botica ServiFarma
# ====================================================

# ====================================================
# CONFIGURACIÓN DE LA APLICACIÓN
# ====================================================
spring.application.name=appServifarmaB

# ====================================================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ====================================================
# IMPORTANTE: estos defaults (root/rio2005) son tus datos de desarrollo local.
# Cuando despliegues en un servidor real, la base de datos de producción
# normalmente NO va a tener las mismas credenciales que tu MySQL local -
# en ese momento, exporta DB_USERNAME/DB_PASSWORD reales del servidor
# y estos defaults dejan de usarse automáticamente.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:servifarmaBD}?serverTimezone=UTC&useSSL=true&requireSSL=true&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rio2005}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones HikariCP (optimizado para producción)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=ServiFarmaDBPool

# ====================================================
# CONFIGURACIÓN JPA / HIBERNATE
# ====================================================
# IMPORTANTE: En producción usar 'validate' o 'none'
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true

# ====================================================
# CONFIGURACIÓN JWT (SEGURIDAD)
# ====================================================
# Sin valor de respaldo real: en producción SIEMPRE debes exportar un
# JWT_SECRET propio y distinto al de desarrollo (genera uno con: openssl rand -base64 32)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ====================================================
# CONFIGURACIÓN DE SEGURIDAD ADICIONAL
# ====================================================
# HTTPS en producción (requiere certificado SSL)
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE:}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS:}

# CORS seguro para producción
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ====================================================
# PeruAPI (RENIEC)
# ====================================================
# Sin valor de respaldo: exporta PERUAPI_KEY en el servidor de producción.
peruapi.api-key=${PERUAPI_KEY}

# ====================================================
# Correo (Gmail SMTP)
# ====================================================
# Sin credenciales de respaldo: exporta MAIL_USERNAME y MAIL_PASSWORD
# (un App Password de Gmail nuevo, no reutilices el de desarrollo).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ====================================================
# CONFIGURACIÓN DE LOGGING (PRODUCCIÓN)
# ====================================================
logging.level.root=WARN
logging.level.com.example.proyecto.app=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR

# Logging a archivo (opcional)
logging.file.name=logs/servifarma-app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ====================================================
# CONFIGURACIÓN DE CACHE (PERFORMANCE)
# ====================================================
spring.cache.type=simple
spring.cache.cache-names=productos,categorias,clientes
spring.cache.simple.time-to-live=600000

# ====================================================
# CONFIGURACIÓN DE THREAD POOL (ASYNC)
# ====================================================
spring.task.execution.pool.core-size=10
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=500
spring.task.execution.thread-name-prefix=servifarma-async-

# ====================================================
# CONFIGURACIÓN DE ARCHIVOS Y UPLOADS
# ====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ====================================================
# CONFIGURACIÓN DE MONITOREO (ACTUATOR)
# ====================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ====================================================
# VARIABLES DE ENTORNO REQUERIDAS
# ====================================================
# DB_HOST=localhost (default, cambia en servidor real)
# DB_PORT=3306 (default)
# DB_NAME=servifarmaBD (default)
# DB_USERNAME=root (default, tu dato local; cambia en servidor real)
# DB_PASSWORD=rio2005 (default, tu dato local; cambia en servidor real)
# JWT_SECRET=(requerido, sin default, minimo 32 caracteres)
# PERUAPI_KEY=(requerido, sin default)
# MAIL_USERNAME=(requerido, sin default)
# MAIL_PASSWORD=(requerido, sin default)
# SSL_ENABLED=false (true en producción real)
# ALLOWED_ORIGINS=(dominios permitidos para CORS)

# ====================================================
# NOTAS DE IMPLEMENTACIÓN
# ====================================================
# 1. Para ejecutar en producción:
#    java -jar appServifarmaB.jar --spring.profiles.active=prod
#
# 2. Crear usuario de base de datos con permisos limitados
#    CREATE USER 'servifarma_user'@'localhost' IDENTIFIED BY 'contraseńa_fuerte';
#    GRANT SELECT, INSERT, UPDATE, DELETE ON servifarmaBD.* TO 'servifarma_user'@'localhost';
#
# 3. Configurar firewall para permitir solo tráfico necesario
#
# 4. Configurar backup automático de base de datos
#
# 5. Monitorear logs y métricas regularmente