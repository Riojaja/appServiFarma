<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Proveedores</h2>
    <a routerLink="/proveedores/crear" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nuevo Proveedor
    </a>
  </div>

  <!-- Buscador -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="input-group">
        <input 
          type="text" 
          class="form-control" 
          placeholder="Buscar por razón social..." 
          [(ngModel)]="filtroRazonSocial"
          (keyup.enter)="buscar()"
        >
        <button class="btn btn-outline-secondary" type="button" (click)="buscar()">
          <i class="bi bi-search"></i>
        </button>
        <button class="btn btn-outline-danger" type="button" (click)="filtroRazonSocial=''; cargarProveedores()">
          <i class="bi bi-x-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>RUC</th>
          <th>Razón Social</th>
          <th>Contacto</th>
          <th>Teléfono</th>
          <th>Región</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="cargando">
          <td colspan="7" class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </td>
        </tr>
        <tr *ngIf="!cargando && proveedores.length === 0">
          <td colspan="7" class="text-center text-muted">No hay proveedores registrados</td>
        </tr>
        <tr *ngFor="let proveedor of proveedores">
          <td>{{ proveedor.id }}</td>
          <td><strong>{{ proveedor.ruc }}</strong></td>
          <td>{{ proveedor.razonSocial }}</td>
          <td>{{ proveedor.contacto || '-' }}</td>
          <td>{{ proveedor.telefono || '-' }}</td>
          <td>{{ proveedor.region || '-' }}</td>
          <td>
            <div class="btn-group btn-group-sm">
              <a [routerLink]="['/proveedores/editar', proveedor.id]" class="btn btn-outline-primary">
                <i class="bi bi-pencil"></i>
              </a>
              <button class="btn btn-outline-danger" (click)="eliminar(proveedor.id!)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
