<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Clientes</h2>
    <a routerLink="/clientes/crear" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nuevo Cliente
    </a>
  </div>

  <!-- Buscador -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="input-group">
        <input 
          type="text" 
          class="form-control" 
          placeholder="Buscar por nombre..." 
          [(ngModel)]="filtroNombre"
          (keyup.enter)="buscar()"
        >
        <button class="btn btn-outline-secondary" type="button" (click)="buscar()">
          <i class="bi bi-search"></i>
        </button>
        <button class="btn btn-outline-danger" type="button" (click)="filtroNombre=''; cargarClientes()">
          <i class="bi bi-x-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Tipo Documento</th>
          <th>N° Documento</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="cargando">
          <td colspan="6" class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </td>
        </tr>
        <tr *ngIf="!cargando && clientes.length === 0">
          <td colspan="6" class="text-center text-muted">No hay clientes registrados</td>
        </tr>
        <tr *ngFor="let cliente of clientes">
          <td>{{ cliente.id }}</td>
          <td><strong>{{ cliente.nombre }}</strong></td>
          <td><span class="badge bg-secondary">{{ cliente.documentoTipo }}</span></td>
          <td>{{ cliente.documentoNumero }}</td>
          <td>{{ cliente.telefono || '-' }}</td>
          <td>
            <div class="btn-group btn-group-sm">
              <a [routerLink]="['/clientes/editar', cliente.id]" class="btn btn-outline-primary">
                <i class="bi bi-pencil"></i>
              </a>
              <button class="btn btn-outline-danger" (click)="eliminar(cliente.id!)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
