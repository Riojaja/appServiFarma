<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Nueva Categoría</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <!-- Nombre -->
            <div class="mb-3">
              <label class="form-label">Nombre <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="nombre"
                placeholder="Ingresa el nombre de la categoría"
              >
              <div *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="text-danger">
                <small *ngIf="form.get('nombre')?.errors?.['required']">El nombre es obligatorio</small>
                <small *ngIf="form.get('nombre')?.errors?.['maxlength']">Máximo 80 caracteres</small>
              </div>
            </div>

            <!-- Descripción -->
            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea 
                class="form-control" 
                formControlName="descripcion"
                rows="3"
                placeholder="Descripción de la categoría"
              ></textarea>
              <div *ngIf="form.get('descripcion')?.invalid && form.get('descripcion')?.touched" class="text-danger">
                <small *ngIf="form.get('descripcion')?.errors?.['maxlength']">Máximo 200 caracteres</small>
              </div>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-2">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Guardar
              </button>
              <a routerLink="/categorias" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
