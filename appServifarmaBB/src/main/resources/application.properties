spring.application.name=appServifarmaB

# Database Configuration
# IMPORTANTE: En producción, usar variables de entorno en lugar de valores hardcodeados
# Ejemplo: spring.datasource.username=${DB_USERNAME:root}
spring.datasource.url=jdbc:mysql://localhost:3306/servifarmaBD?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rio2005}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# JWT Configuration
# IMPORTANTE: En producción, usar variable de entorno: ${JWT_SECRET}
# NUNCA subir este archivo a repositorios públicos con valores reales
jwt.secret=${JWT_SECRET:ServiFarma2026_ClaveSegura#42!ConMasDe32Caracteres}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging Configuration (opcional, para mejor debugging)
logging.level.com.example.proyecto.app.security=DEBUG
logging.level.org.springframework.security=INFO