<div class="login-page">

  <!-- ===== COLUMNA IZQUIERDA: FORMULARIO ===== -->
  <div class="login-left">
    <div class="login-content">

      <!-- Logo real -->
      <div class="text-center login-brand">
        <img src="logoServifarma.jpeg" alt="ServiFarma" class="login-logo-img">
        <h1 class="login-title">ServiFarma</h1>
        <p class="login-subtitle">Sistema de Gestión Farmacéutica</p>
      </div>

      <div class="login-divider"></div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

        <!-- Usuario -->
        <div class="mb-3">
          <label for="usuario" class="form-label">Usuario</label>
          <div class="input-with-icon">
            <i class="bi bi-person"></i>
            <input
              type="text"
              class="form-control"
              id="usuario"
              name="usuario"
              [(ngModel)]="loginData.usuario"
              required
              autofocus
              autocomplete="username"
              placeholder="Ingrese su usuario"
            >
          </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
          <label for="contrasena" class="form-label">Contraseña</label>
          <div class="input-with-icon password-field">
            <i class="bi bi-lock"></i>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-control"
              id="contrasena"
              name="contrasena"
              [(ngModel)]="loginData.contrasena"
              required
              autocomplete="current-password"
              placeholder="Ingrese su contraseña"
            >
            <button
              type="button"
              class="password-toggle-btn"
              (click)="togglePassword()"
              tabindex="-1"
              aria-label="Mostrar u ocultar contraseña"
            >
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
            </button>
          </div>
        </div>

        <!-- Error -->
        <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center py-2 login-error" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <!-- Botón -->
        <button
          type="submit"
          class="btn btn-primary w-100 login-btn"
          [disabled]="isLoading"
        >
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <i class="bi bi-box-arrow-in-right me-2" *ngIf="!isLoading"></i>
          {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>

      <div class="text-center mt-3">
        <a href="javascript:void(0)" class="forgot-link">¿Olvidó su contraseña?</a>
      </div>

      <div class="login-footer">
        <span>© 2026 ServiFarma</span>
        <span class="dot-sep"></span>
        <span>v1.0</span>
      </div>

    </div>
  </div>

  <!-- ===== COLUMNA DERECHA: IMAGEN/MARCA ===== -->
  <div class="login-right">
    <div class="login-image-content">
      <span class="brand-pill">
        <i class="bi bi-capsule"></i> Gestión Farmacéutica
      </span>
      <h2>Bienvenido de vuelta</h2>
      <p>Accede a tu panel de control para gestionar tu farmacia de manera eficiente y segura.</p>
      <div class="image-features">
        <span><i class="bi bi-shield-check"></i> Seguro</span>
        <span><i class="bi bi-graph-up"></i> Eficiente</span>
        <span><i class="bi bi-clock"></i> 24/7</span>
      </div>
    </div>
  </div>

</div>
