<div class="container-fluid mt-4">
  <h2>Dashboard de Estadísticas</h2>

  <!-- Filtros -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <label class="form-label">Fecha Inicio</label>
      <input type="date" class="form-control" [(ngModel)]="fechaInicio" (change)="cargarDatos()">
    </div>
    <div class="col-md-3">
      <label class="form-label">Fecha Fin</label>
      <input type="date" class="form-control" [(ngModel)]="fechaFin" (change)="cargarDatos()">
    </div>
    <div class="col-md-3 d-flex align-items-end">
      <button class="btn btn-primary w-100" (click)="cargarDatos()">Actualizar</button>
    </div>
  </div>

  <!-- Tarjetas de métricas -->
  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="card text-white bg-primary shadow-sm">
        <div class="card-body">
          <h6 class="card-title text-uppercase fw-light">Total Ventas</h6>
          <p class="card-text display-6 fw-bold">S/ {{ totalVentas | number:'1.2-2' }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-white bg-success shadow-sm">
        <div class="card-body">
          <h6 class="card-title text-uppercase fw-light">Transacciones</h6>
          <p class="card-text display-6 fw-bold">{{ totalTransacciones }}</p>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card text-white bg-warning shadow-sm">
        <div class="card-body">
          <h6 class="card-title text-uppercase fw-light">Ticket Promedio</h6>
          <p class="card-text display-6 fw-bold">S/ {{ ticketPromedio | number:'1.2-2' }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Gráficos -->
  <div class="row g-4">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="card-title mb-0">Ventas por Día</h5>
        </div>
        <div class="card-body">
          <canvas
            baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            [type]="barChartType">
          </canvas>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="card-title mb-0">Distribución por Pago</h5>
        </div>
        <div class="card-body">
          <canvas
            baseChart
            [data]="pieChartData"
            [options]="pieChartOptions"
            [type]="pieChartType">
          </canvas>
        </div>
      </div>
    </div>
    <div class="col-md-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="card-title mb-0">Ventas por Hora</h5>
        </div>
        <div class="card-body">
          <canvas
            baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            [type]="lineChartType">
          </canvas>
        </div>
      </div>
    </div>
  </div>
</div>
