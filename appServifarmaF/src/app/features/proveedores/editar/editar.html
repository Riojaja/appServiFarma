<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Editar Proveedor</h4>
        </div>
        <div class="card-body">
          <div *ngIf="cargando" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>

          <form *ngIf="!cargando" [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">RUC <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="ruc"
                placeholder="11 dígitos"
                maxlength="11"
              >
              <div *ngIf="form.get('ruc')?.invalid && form.get('ruc')?.touched" class="text-danger">
                <small *ngIf="form.get('ruc')?.errors?.['required']">El RUC es obligatorio</small>
                <small *ngIf="form.get('ruc')?.errors?.['minlength'] || form.get('ruc')?.errors?.['maxlength']">El RUC debe tener 11 dígitos</small>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Razón Social <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="razonSocial"
                placeholder="Razón social del proveedor"
              >
              <div *ngIf="form.get('razonSocial')?.invalid && form.get('razonSocial')?.touched" class="text-danger">
                <small *ngIf="form.get('razonSocial')?.errors?.['required']">La razón social es obligatoria</small>
                <small *ngIf="form.get('razonSocial')?.errors?.['maxlength']">Máximo 150 caracteres</small>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Dirección</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="direccion"
                placeholder="Dirección del proveedor"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Teléfono</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="telefono"
                placeholder="Teléfono"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input 
                type="email" 
                class="form-control" 
                formControlName="email"
                placeholder="correo@proveedor.com"
              >
              <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-danger">
                <small *ngIf="form.get('email')?.errors?.['email']">Ingresa un email válido</small>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contacto</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="contacto"
                placeholder="Persona de contacto"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Región</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="region"
                placeholder="Región (ej. Lima, Cusco)"
              >
            </div>

            <div class="d-flex gap-2">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Actualizar
              </button>
              <a routerLink="/proveedores" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
