<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Crear Mensaje en Bitácora</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Tipo <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="tipo">
                <option value="novedad">Novedad</option>
                <option value="recordatorio">Recordatorio</option>
                <option value="incidencia">Incidencia</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Mensaje <span class="text-danger">*</span></label>
              <textarea 
                class="form-control" 
                rows="4"
                formControlName="mensaje"
                placeholder="Escribe el mensaje para el siguiente turno..."
              ></textarea>
              <div *ngIf="form.get('mensaje')?.invalid && form.get('mensaje')?.touched" class="text-danger">
                <small *ngIf="form.get('mensaje')?.errors?.['required']">El mensaje es obligatorio</small>
                <small *ngIf="form.get('mensaje')?.errors?.['maxlength']">Máximo 2000 caracteres</small>
              </div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

            <div class="d-flex gap-2">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Guardar
              </button>
              <a routerLink="/bitacora/listar" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
