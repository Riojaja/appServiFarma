<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Categorías</h2>
    <a routerLink="/categorias/crear" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nueva Categoría
    </a>
  </div>

  <!-- Filtro de búsqueda -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="input-group">
        <input 
          type="text" 
          class="form-control" 
          placeholder="Buscar por nombre..." 
          [(ngModel)]="filtroNombre"
          (keyup.enter)="buscar()"
        >
        <button class="btn btn-outline-secondary" type="button" (click)="buscar()">
          <i class="bi bi-search"></i>
        </button>
        <button class="btn btn-outline-danger" type="button" (click)="filtroNombre=''; cargarCategorias()">
          <i class="bi bi-x-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Fecha Creación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="cargando">
          <td colspan="5" class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </td>
        </tr>
        <tr *ngIf="!cargando && categorias.length === 0">
          <td colspan="5" class="text-center text-muted">No hay categorías registradas</td>
        </tr>
        <tr *ngFor="let categoria of categorias">
          <td>{{ categoria.id }}</td>
          <td><strong>{{ categoria.nombre }}</strong></td>
          <td>{{ categoria.descripcion || '-' }}</td>
          <td>{{ categoria.createdAt | date:'dd/MM/yyyy' }}</td>
          <td>
            <div class="btn-group btn-group-sm">
              <a [routerLink]="['/categorias/editar', categoria.id]" class="btn btn-outline-primary">
                <i class="bi bi-pencil"></i>
              </a>
              <button *ngIf="auth.isAdmin()" class="btn btn-outline-danger" (click)="eliminar(categoria.id!)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
