<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Apertura de Caja</h4>
        </div>
        <div class="card-body">
          <div *ngIf="existeCajaAbierta" class="alert alert-warning">
            <i class="bi bi-exclamation-triangle"></i> {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!existeCajaAbierta">
            <div class="mb-3">
              <label class="form-label">Monto de Apertura <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">S/</span>
                <input 
                  type="number" 
                  class="form-control" 
                  formControlName="montoApertura"
                  placeholder="0.00"
                  step="0.01"
                  min="0.01"
                >
              </div>
              <div *ngIf="form.get('montoApertura')?.invalid && form.get('montoApertura')?.touched" class="text-danger">
                <small *ngIf="form.get('montoApertura')?.errors?.['required']">El monto es obligatorio</small>
                <small *ngIf="form.get('montoApertura')?.errors?.['min']">Debe ser mayor a 0</small>
              </div>
            </div>

            <div *ngIf="errorMessage && !existeCajaAbierta" class="alert alert-danger">
              {{ errorMessage }}
            </div>

            <div class="d-flex gap-2">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando || existeCajaAbierta"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Abrir Caja
              </button>
              <a routerLink="/caja/estado" class="btn btn-outline-secondary">Ver Estado</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
