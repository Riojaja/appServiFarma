<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Nuevo Fabricante</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Nombre <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="nombre"
                placeholder="Nombre del fabricante"
              >
              <div *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="text-danger">
                <small *ngIf="form.get('nombre')?.errors?.['required']">El nombre es obligatorio</small>
                <small *ngIf="form.get('nombre')?.errors?.['maxlength']">Máximo 150 caracteres</small>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contacto</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="contacto"
                placeholder="Nombre del contacto"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Teléfono</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="telefono"
                placeholder="Teléfono del fabricante"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input 
                type="email" 
                class="form-control" 
                formControlName="email"
                placeholder="correo@fabricante.com"
              >
              <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-danger">
                <small *ngIf="form.get('email')?.errors?.['email']">Ingresa un email válido</small>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Guardar
              </button>
              <a routerLink="/fabricantes" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
