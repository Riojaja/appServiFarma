<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Fabricantes</h2>
    <a routerLink="/fabricantes/crear" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nuevo Fabricante
    </a>
  </div>

  <!-- Buscador -->
  <div class="row mb-3">
    <div class="col-md-4">
      <div class="input-group">
        <input 
          type="text" 
          class="form-control" 
          placeholder="Buscar por nombre..." 
          [(ngModel)]="filtroNombre"
          (keyup.enter)="buscar()"
        >
        <button class="btn btn-outline-secondary" type="button" (click)="buscar()">
          <i class="bi bi-search"></i>
        </button>
        <button class="btn btn-outline-danger" type="button" (click)="filtroNombre=''; cargarFabricantes()">
          <i class="bi bi-x-circle"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Contacto</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="cargando">
          <td colspan="6" class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </td>
        </tr>
        <tr *ngIf="!cargando && fabricantes.length === 0">
          <td colspan="6" class="text-center text-muted">No hay fabricantes registrados</td>
        </tr>
        <tr *ngFor="let fabricante of fabricantes">
          <td>{{ fabricante.id }}</td>
          <td><strong>{{ fabricante.nombre }}</strong></td>
          <td>{{ fabricante.contacto || '-' }}</td>
          <td>{{ fabricante.telefono || '-' }}</td>
          <td>{{ fabricante.email || '-' }}</td>
          <td>
            <div class="btn-group btn-group-sm">
              <a [routerLink]="['/fabricantes/editar', fabricante.id]" class="btn btn-outline-primary">
                <i class="bi bi-pencil"></i>
              </a>
              <button *ngIf="auth.isAdmin()" class="btn btn-outline-danger" (click)="eliminar(fabricante.id!)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
