<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Editar Producto</h4>
        </div>
        <div class="card-body">
          <div *ngIf="cargando" class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
          </div>

          <form *ngIf="!cargando" [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="row">
              <!-- Columna izquierda -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Nombre <span class="text-danger">*</span></label>
                  <input 
                    type="text" 
                    class="form-control" 
                    formControlName="nombre"
                    placeholder="Nombre del producto"
                  >
                  <div *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="text-danger">
                    <small *ngIf="form.get('nombre')?.errors?.['required']">El nombre es obligatorio</small>
                    <small *ngIf="form.get('nombre')?.errors?.['maxlength']">Máximo 200 caracteres</small>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Código de Barras</label>
                  <input 
                    type="text" 
                    class="form-control" 
                    formControlName="codigoBarras"
                    placeholder="Código de barras"
                  >
                </div>

                <div class="mb-3">
                  <label class="form-label">Principio Activo</label>
                  <input 
                    type="text" 
                    class="form-control" 
                    formControlName="principioActivo"
                    placeholder="Principio activo del medicamento"
                  >
                </div>

                <div class="mb-3">
                  <label class="form-label">URL de Imagen</label>
                  <input 
                    type="text" 
                    class="form-control" 
                    formControlName="imagen"
                    placeholder="Ruta de la imagen"
                  >
                </div>
              </div>

              <!-- Columna derecha -->
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="form-label">Categoría</label>
                  <select class="form-select" formControlName="categoriaId">
                    <option [value]="null">Sin categoría</option>
                    <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nombre }}</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Fabricante</label>
                  <select class="form-select" formControlName="fabricanteId">
                    <option [value]="null">Sin fabricante</option>
                    <option *ngFor="let fab of fabricantes" [value]="fab.id">{{ fab.nombre }}</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Precio de Venta <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text">S/</span>
                    <input 
                      type="number" 
                      class="form-control" 
                      formControlName="precioVentaActual"
                      placeholder="0.00"
                      step="0.01"
                    >
                  </div>
                  <div *ngIf="form.get('precioVentaActual')?.invalid && form.get('precioVentaActual')?.touched" class="text-danger">
                    <small *ngIf="form.get('precioVentaActual')?.errors?.['required']">El precio es obligatorio</small>
                    <small *ngIf="form.get('precioVentaActual')?.errors?.['min']">Debe ser mayor a 0</small>
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Stock Mínimo <span class="text-danger">*</span></label>
                  <input 
                    type="number" 
                    class="form-control" 
                    formControlName="stockMinimo"
                    placeholder="5"
                  >
                  <div *ngIf="form.get('stockMinimo')?.invalid && form.get('stockMinimo')?.touched" class="text-danger">
                    <small *ngIf="form.get('stockMinimo')?.errors?.['required']">El stock mínimo es obligatorio</small>
                    <small *ngIf="form.get('stockMinimo')?.errors?.['min']">Debe ser mayor a 0</small>
                  </div>
                </div>

                <div class="mb-3 form-check">
                  <input 
                    type="checkbox" 
                    class="form-check-input" 
                    id="esGenerico"
                    formControlName="esGenerico"
                  >
                  <label class="form-check-label" for="esGenerico">Es un producto genérico</label>
                </div>
              </div>
            </div>

            <div class="d-flex gap-2 mt-3">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Actualizar
              </button>
              <a routerLink="/productos" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
