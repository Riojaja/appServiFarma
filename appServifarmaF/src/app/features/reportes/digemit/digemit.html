<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Reporte DIGEMIT</h4>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Mes <span class="text-danger">*</span></label>
            <input 
              type="month" 
              class="form-control" 
              [(ngModel)]="mes"
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Formato</label>
            <select class="form-select" [(ngModel)]="formato">
              <option value="excel">Excel (.xlsx)</option>
              <option value="pdf">PDF</option>
              <option value="csv">CSV</option>
            </select>
          </div>

          <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

          <button 
            class="btn btn-primary w-100"
            (click)="generar()"
            [disabled]="cargando || !mes"
          >
            <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2"></span>
            {{ cargando ? 'Generando...' : 'Generar Reporte' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
