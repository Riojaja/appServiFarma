<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h4 class="card-title mb-0">Registrar Demanda Insatisfecha</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Producto Solicitado <span class="text-danger">*</span></label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="productoSolicitado"
                placeholder="Nombre del producto que el cliente pidió"
              >
              <div *ngIf="form.get('productoSolicitado')?.invalid && form.get('productoSolicitado')?.touched" class="text-danger">
                <small *ngIf="form.get('productoSolicitado')?.errors?.['required']">El nombre del producto es obligatorio</small>
                <small *ngIf="form.get('productoSolicitado')?.errors?.['maxlength']">Máximo 200 caracteres</small>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Documento del Cliente (opcional)</label>
              <input 
                type="text" 
                class="form-control" 
                formControlName="clienteDocumento"
                placeholder="DNI o RUC del cliente"
              >
              <div *ngIf="form.get('clienteDocumento')?.errors?.['maxlength']" class="text-danger">
                <small>Máximo 20 caracteres</small>
              </div>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

            <div class="d-flex gap-2">
              <button 
                type="submit" 
                class="btn btn-primary"
                [disabled]="form.invalid || enviando"
              >
                <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
                Registrar
              </button>
              <a routerLink="/demanda/listar" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
