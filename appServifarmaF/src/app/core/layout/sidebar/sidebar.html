<div class="sidebar">
  <!-- Logo -->
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="32" r="14" fill="#2b2470"/>
        <path d="M50 46c-16 0-28 10-28 24v6h56v-6c0-14-12-24-28-24z" fill="#5b4fc7"/>
        <circle cx="38" cy="40" r="9" fill="#3aa0e0"/>
        <rect x="44" y="56" width="12" height="28" rx="2" fill="#e53935"/>
        <rect x="36" y="64" width="28" height="12" rx="2" fill="#e53935"/>
      </svg>
    </div>
    <span class="brand-text">ServiFarma</span>
  </div>

  <!-- Usuario -->
  <div class="sidebar-user">
    <i class="bi bi-person-circle"></i>
    <div>
      <div class="user-name">{{ usuario }}</div>
      <small class="user-role">{{ rol }}</small>
    </div>
  </div>

  <!-- Menú de navegación -->
  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <i class="bi bi-grid-1x2-fill"></i> <span>Dashboard</span>
    </a>
    <a routerLink="/inventario" routerLinkActive="active" class="nav-item">
      <i class="bi bi-box-seam"></i> <span>Inventario</span>
    </a>
    <a routerLink="/buscador" routerLinkActive="active" class="nav-item">
      <i class="bi bi-search"></i> <span>Buscador Visual</span>
    </a>
    <a routerLink="/ventas" routerLinkActive="active" class="nav-item">
      <i class="bi bi-cart3"></i> <span>Ventas</span>
    </a>
    <a routerLink="/clientes" routerLinkActive="active" class="nav-item">
      <i class="bi bi-person-badge"></i> <span>Clientes</span>
    </a>
    <a routerLink="/caja" routerLinkActive="active" class="nav-item">
      <i class="bi bi-cash-stack"></i> <span>Caja</span>
    </a>
    <a routerLink="/demanda" routerLinkActive="active" class="nav-item">
      <i class="bi bi-graph-down-arrow"></i> <span>Demanda Insatisfecha</span>
    </a>
    <a routerLink="/proveedores" routerLinkActive="active" class="nav-item">
      <i class="bi bi-truck"></i> <span>Proveedores</span>
    </a>

    <ng-container *ngIf="isAdmin">
      <a routerLink="/reporte-digemid" routerLinkActive="active" class="nav-item">
        <i class="bi bi-file-earmark-bar-graph"></i> <span>Reporte DIGEMID</span>
      </a>
      <a routerLink="/rentabilidad" routerLinkActive="active" class="nav-item">
        <i class="bi bi-bar-chart-line-fill"></i> <span>Rentabilidad</span>
      </a>
      <a routerLink="/auditoria" routerLinkActive="active" class="nav-item">
        <i class="bi bi-shield-check"></i> <span>Auditoría</span>
      </a>
      <a routerLink="/configuracion" routerLinkActive="active" class="nav-item">
        <i class="bi bi-gear-fill"></i> <span>Configuración</span>
      </a>
    </ng-container>
  </nav>

  <!-- Cerrar Sesión -->
  <a class="nav-item logout-item" (click)="logout()">
    <i class="bi bi-box-arrow-right"></i> <span>Cerrar Sesión</span>
  </a>
</div>
